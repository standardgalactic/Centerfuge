<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Starpop</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
<style>
html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:Consolas,monospace}
canvas{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
#hud{
  position:fixed;top:10px;left:10px;
  color:#7dff8d;font-size:13px;
  background:rgba(0,10,0,.6);
  padding:6px 10px;
  border:1px solid rgba(125,255,141,.25);
  border-radius:5px;
  text-shadow:0 0 6px rgba(125,255,141,.4);
  pointer-events:none;
}
#hud strong{color:#caffcf}
#pop{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  font-size:18px;color:#7dff8d;font-weight:bold;
  text-shadow:0 0 10px #7dff8d;
  opacity:0;transition:opacity .1s;pointer-events:none;
}
#loader{
  position:fixed;inset:0;background:#000;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  color:#7dff8d;font-size:13px;
}
.spin{width:34px;height:34px;border-radius:50%;border:2px solid #1a4a2a;border-top-color:#7dff8d;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
body::after{content:"";position:fixed;inset:0;pointer-events:none;
  background:repeating-linear-gradient(to bottom,rgba(100,255,140,.011) 0,rgba(100,255,140,.011) 1px,transparent 2px,transparent 4px);
  mix-blend-mode:screen;opacity:.18;z-index:30}
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="hud">score <strong id="score">0</strong></div>
<div id="pop"></div>
<div id="loader">
  <div class="spin"></div>
  <div>Loading Starpop…</div>
  <div style="font-size:11px;color:#2a6a3a">~15s on first load</div>
</div>

<script>
// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
let W, H;
function resize(){
  const dpr = Math.max(1, devicePixelRatio || 1);
  W = innerWidth; H = innerHeight;
  canvas.width = W*dpr; canvas.height = H*dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
addEventListener('resize', resize);

// ── Tilt ──────────────────────────────────────────────────────────────────────
let tiltX = 0, tiltY = 0, baseBeta = null, baseGamma = null;
function handleOrientation(e){
  if(baseBeta === null){ baseBeta = e.beta||0; baseGamma = e.gamma||0; }
  tiltY = Math.max(-1, Math.min(1, ((e.beta||0)  - baseBeta)  / 30));
  tiltX = Math.max(-1, Math.min(1, ((e.gamma||0) - baseGamma) / 30));
}
function requestOrientation(){
  if(typeof DeviceOrientationEvent !== 'undefined' &&
     typeof DeviceOrientationEvent.requestPermission === 'function'){
    DeviceOrientationEvent.requestPermission()
      .then(s => { if(s==='granted') addEventListener('deviceorientation', handleOrientation, true); });
  } else {
    addEventListener('deviceorientation', handleOrientation, true);
  }
}
addEventListener('touchstart', requestOrientation, { once: true });

// ── Tap to pop ────────────────────────────────────────────────────────────────
// We keep a live list of drawn bubbles from the last frame so tap can hit-test them.
let lastEnts = [];

function handleTap(clientX, clientY){
  for(const { p, r, e } of lastEnts){
    const dx = clientX - p.x;
    const dy = clientY - p.y;
    if(dx*dx + dy*dy < r*r){
      if(!pendingPops.has(e.id))
        doPop(e.id, e.bad, p.x, p.y, r);
      break;
    }
  }
}

canvas.addEventListener('click',      e => handleTap(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  handleTap(t.clientX, t.clientY);
}, { passive: true });

// ── Engine ────────────────────────────────────────────────────────────────────
const ENGINE = `
import random
from dataclasses import dataclass, field

WORLD = None

MISSPELLED = [
    ("recieve","receive",2),("occured","occurred",2),("untill","until",3),
    ("wierd","weird",3),("accomodate","accommodate",3),("existance","existence",2),
    ("grammer","grammar",2),("occassion","occasion",2),("neccessary","necessary",3),
    ("seperate","separate",2),("definately","definitely",3),("persue","pursue",2),
    ("embarass","embarrass",2),("reccomend","recommend",3),("belive","believe",2),
    ("begining","beginning",3),("arguement","argument",3),("truely","truly",2),
    ("comming","coming",2),("intresting","interesting",3),("maintainance","maintenance",3),
    ("parralel","parallel",3),("privelege","privilege",3),("recieved","received",2),
    ("relevent","relevant",2),("resistence","resistance",3),("resteraunt","restaurant",4),
    ("riddiculous","ridiculous",3),("succesfull","successful",3),("tounge","tongue",2),
    ("vaccum","vacuum",2),("writting","writing",2),("freind","friend",2),
    ("beleive","believe",3),("calender","calendar",2),("catagory","category",2),
    ("collegue","colleague",2),("concious","conscious",2),("dependant","dependent",2),
    ("dilemna","dilemma",2),("enviroment","environment",2),("febuary","february",2),
    ("goverment","government",2),("harrass","harass",2),("immediatly","immediately",3),
    ("innoculate","inoculate",2),("liason","liaison",2),("miniscule","minuscule",2),
    ("perseverence","perseverance",2),("pronounciation","pronunciation",3),
    ("shedule","schedule",2),("supercede","supersede",2),("tatoo","tattoo",2),
    ("tendancy","tendency",2),("tyrany","tyranny",2),("unforseen","unforeseen",2),
    ("vegeterian","vegetarian",2),("wether","whether",2),("aquire","acquire",2),
    ("publically","publicly",2),("payed","paid",2),("freind","friend",2),
]

CORRECT = [
    "necessary","accommodate","occurrence","particularly","definitely",
    "separate","beautiful","beginning","conscience","millennium",
    "privilege","threshold","apparent","tendency","discipline",
    "embarrass","equipment","exaggerate","immediately","independent",
    "leisure","lieutenant","maintenance","noticeable","parallel",
    "persistent","relevant","resistance","restaurant","ridiculous",
    "silhouette","successful","technically","temperature","throughout",
    "guarantee","manoeuvre","fahrenheit","theoretical","unfortunately",
    "rhythm","liaison","questionnaire","bureaucracy","conscientious",
    "Mediterranean","miscellaneous","commemorate","chrysanthemum",
]

@dataclass
class E:
    id:   int
    x:    float
    y:    float
    z:    float
    r:    float
    word: str
    bad:  bool
    pts:  int
    alive: bool = True

def reset():
    global WORLD
    WORLD = {"ents": {}, "next": 1, "score": 0}
    _spawn(28)

def _spawn(n):
    for _ in range(n):
        if random.random() < 0.58:
            w, correct, errors = random.choice(MISSPELLED)
            bad = True; pts = 10 * errors
        else:
            w = random.choice(CORRECT)
            bad = False; pts = 0
        eid = WORLD["next"]
        WORLD["ents"][eid] = E(eid,
            random.uniform(-11, 11),
            random.uniform(-7,  7),
            -(12 + random.random() * 65),
            random.uniform(1.0, 2.2),
            w, bad, pts)
        WORLD["next"] += 1

def step():
    alive_words = [e for e in WORLD["ents"].values() if e.alive]
    if len(alive_words) < 12:
        _spawn(10)
    for e in alive_words:
        e.z += 0.055   # forward speed — tweak this to taste
        if e.z > 2.5:
            e.z = -(12 + random.random() * 60)
            e.x = random.uniform(-11, 11)
            e.y = random.uniform(-7,  7)
    return {
        "score": WORLD["score"],
        "ents":  [{"id":e.id,"x":e.x,"y":e.y,"z":e.z,
                   "r":e.r,"word":e.word,"bad":e.bad,"pts":e.pts}
                  for e in alive_words]
    }

def pop(eid):
    e = WORLD["ents"].get(int(eid))
    if not e or not e.alive: return 0
    e.alive = False
    if e.bad:
        WORLD["score"] += e.pts
        return e.pts
    else:
        WORLD["score"] = max(0, WORLD["score"] - 10)
        return -10

reset()
`;

let py, pyReady = false;

async function pyCall(expr, globals = {}){
  for(const k in globals) py.globals.set(k, globals[k]);
  try{
    const r = await py.runPythonAsync(expr);
    return r && r.toJs ? r.toJs({ dict_converter: Object.fromEntries }) : r;
  } finally {
    for(const k in globals) py.globals.delete(k);
  }
}

// ── Pop feedback ──────────────────────────────────────────────────────────────
let popTimer = null;

// Pending flash-then-pop: eid -> { px, py, r, isBad, startTs }
const pendingPops = new Map();

// Particle system — each piece has warble (wobble) parameters
const particles = [];

function spawnExplosion(px, py_, r, isBad){
  const col   = isBad ? [125, 255, 141] : [255, 140, 40];
  const count = 14 + Math.floor(Math.random() * 10); // 14–23 pieces
  for(let i = 0; i < count; i++){
    const angle  = Math.random() * Math.PI * 2;
    const spd    = 2.5 + Math.random() * 6.5;        // wide speed range
    const size   = 2 + Math.random() * 5;
    const wobbleFreq  = 3 + Math.random() * 6;       // warble frequency
    const wobbleAmp   = 0.8 + Math.random() * 2.2;   // warble amplitude
    const wobblePhase = Math.random() * Math.PI * 2;
    const lifespan    = 0.55 + Math.random() * 0.65; // 0.55–1.2s
    particles.push({
      x: px, y: py_,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      vy0: Math.sin(angle) * spd,
      ax: (Math.random() - 0.5) * 0.3,  // slight random drift
      ay: 0.08 + Math.random() * 0.12,   // subtle gravity
      wobbleFreq, wobbleAmp, wobblePhase,
      size, col,
      life: lifespan, maxLife: lifespan,
      t: 0,
    });
  }
  // ring shockwave
  particles.push({ shockwave: true, x: px, y: py_, r: r * 0.3, maxR: r * 2.8,
                   col, life: 0.35, maxLife: 0.35 });
}

async function doPop(eid, isBad, px, py_, r){
  // immediately register pending flash — red outline for 250ms, then actually pop
  pendingPops.set(eid, { px, py_, r, isBad, startTs: performance.now() });

  setTimeout(async () => {
    pendingPops.delete(eid);
    const scored = await pyCall('pop(EID)', { EID: eid });
    if(scored === 0) return;

    spawnExplosion(px, py_, r, isBad);

    const el = document.getElementById('pop');
    el.style.color   = scored > 0 ? '#7dff8d' : '#ff5050';
    el.textContent   = scored > 0 ? '+' + scored : '−10';
    el.style.opacity = '1';
    clearTimeout(popTimer);
    popTimer = setTimeout(() => el.style.opacity = '0', 800);

    const newScore = await pyCall('WORLD["score"]');
    document.getElementById('score').textContent = newScore;
  }, 250);
}

// ── Projection ────────────────────────────────────────────────────────────────
function project(x, y, z){
  if(z > -0.2) return null;
  const f = Math.min(W, H) * 1.1;
  const s = f / (-z + 0.001);
  return { x: W/2 + x*s, y: H/2 + y*s, s };
}

// ── Stars ─────────────────────────────────────────────────────────────────────
let time = 0;
function drawStars(){
  for(let i = 0; i < 460; i++){
    const seed = i*17.123+9.331;
    const sx = ((((Math.sin(seed*.91)*43758.5)%1)+1)%1)-.5;
    const sy = ((((Math.sin(seed*1.37)*12345.6)%1)+1)%1)-.5;
    const sz = ((((Math.sin(seed*2.17)*98765.4)%1)+1)%1);
    const lay = .3+(i%7)/7;
    const z = -(((sz*130+time*(18+lay*55))%130)+2);
    const p = project(sx*170 - tiltX*2, sy*100 - tiltY*2, z);
    if(!p) continue;
    const size  = Math.max(.5, Math.min(2.2, p.s*.013*lay));
    const alpha = Math.max(.07, Math.min(.85, 1/((-z)*.052)));
    ctx.fillStyle = `rgba(125,255,141,${alpha})`;
    ctx.fillRect(p.x, p.y, size, size);
  }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
let lastTs = 0;

async function loop(ts){
  if(!pyReady){ requestAnimationFrame(loop); return; }
  if(!lastTs) lastTs = ts;
  const dt = Math.min(0.05, (ts - lastTs) / 1000);
  lastTs = ts; time += dt;

  const state = await pyCall('step()');

  // clear
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  // particles + shockwaves
  for(let i = particles.length - 1; i >= 0; i--){
    const pt = particles[i];
    const decay = pt.life / pt.maxLife;

    if(pt.shockwave){
      // expanding ring
      const cr = pt.r + (pt.maxR - pt.r) * (1 - decay);
      const [r0,g0,b0] = pt.col;
      ctx.strokeStyle = `rgba(${r0},${g0},${b0},${decay*.7})`;
      ctx.lineWidth   = 2 * decay;
      ctx.beginPath(); ctx.arc(pt.x, pt.y, cr, 0, Math.PI*2); ctx.stroke();
      pt.life -= 0.018;
      if(pt.life <= 0) particles.splice(i, 1);
      continue;
    }

    // warbling fragment
    pt.t    += 0.08;
    pt.vx   += pt.ax;
    pt.vy   += pt.ay;
    // wobble perpendicular to velocity
    const spd  = Math.sqrt(pt.vx*pt.vx + pt.vy*pt.vy);
    const nx   = -pt.vy / (spd||1);
    const ny   =  pt.vx / (spd||1);
    const wob  = Math.sin(pt.t * pt.wobbleFreq + pt.wobblePhase) * pt.wobbleAmp;
    pt.x += pt.vx + nx * wob;
    pt.y += pt.vy + ny * wob;
    pt.life -= 0.016 + Math.random() * 0.008; // randomised fade rate
    if(pt.life <= 0){ particles.splice(i,1); continue; }

    const [r0,g0,b0] = pt.col;
    const sz = pt.size * decay;
    ctx.shadowColor = `rgba(${r0},${g0},${b0},${decay*.6})`;
    ctx.shadowBlur  = sz * 2;
    ctx.fillStyle   = `rgba(${r0},${g0},${b0},${Math.min(1, decay*1.3)})`;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, Math.max(0.8, sz), 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // build hit list for this frame
  lastEnts = [];

  for(const e of state.ents){
    const p = project(e.x - tiltX*0.6, e.y - tiltY*0.6, e.z);
    if(!p) continue;

    const r = Math.max(10, e.r * p.s);

    // store for tap hit-testing
    lastEnts.push({ p, r, e });

    // skip entity if it's in mid-flash (will be drawn as red overlay instead)
    const isPending = pendingPops.has(e.id);

    // colour scheme: amber for correct, green for misspelled
    const baseCol = e.bad ? '125,255,141' : '255,187,68';
    const textCol = e.bad ? '202,255,207'  : '255,228,140';

    // bubble ring — flash red if pending pop
    const alpha = Math.max(.3, Math.min(.92, 1.5/((-e.z)*.07)));
    let strokeCol, glowCol;
    if(isPending){
      const age = (performance.now() - pendingPops.get(e.id).startTs) / 250;
      const pulse = 0.6 + 0.4 * Math.sin(age * Math.PI * 8); // fast flicker
      strokeCol = `rgba(255,60,60,${Math.min(1, alpha * 1.4 * pulse)})`;
      glowCol   = `rgba(255,60,60,0.6)`;
    } else {
      strokeCol = `rgba(${baseCol},${alpha})`;
      glowCol   = `rgba(${baseCol},${Math.min(.45,alpha*.5)})`;
    }

    ctx.shadowColor = glowCol;
    ctx.shadowBlur  = r * (isPending ? .5 : .26);
    ctx.strokeStyle = strokeCol;
    ctx.lineWidth   = Math.max(1, r * (isPending ? .07 : .04));
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // inner pulse ring (skip when flashing)
    if(r > 14 && !isPending){
      ctx.strokeStyle = `rgba(${baseCol},${alpha*.16})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r*(.70+Math.sin(time*3+e.id*1.7)*.05), 0, Math.PI*2);
      ctx.stroke();
    }

    // label
    if(r > 9){
      const fs = Math.max(9, Math.min(19, r*.33));
      ctx.font = `${fs}px Consolas,monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = isPending ? `rgba(255,160,160,${alpha})` : `rgba(${textCol},${alpha})`;
      ctx.fillText(e.word, p.x, p.y);
    }
  }

  requestAnimationFrame(loop);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  py = await loadPyodide();
  await py.runPythonAsync(ENGINE);
  pyReady = true;
  document.getElementById('loader').style.display = 'none';
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
