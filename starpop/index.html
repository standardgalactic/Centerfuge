<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Starpop · Word Shooter</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
<style>
html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:Consolas,monospace}
canvas{position:fixed;inset:0;width:100%;height:100%;display:block}

#hud{
  position:fixed;top:10px;left:10px;
  color:#7dff8d;font-size:13px;
  background:rgba(0,10,0,.6);
  padding:6px 10px;
  border:1px solid rgba(125,255,141,.25);
}
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="hud">score <span id="score">0</span></div>

<script>
// ── Canvas ─────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W,H;
function resize(){
  const dpr = Math.max(1, devicePixelRatio||1);
  W = innerWidth; H = innerHeight;
  canvas.width = W*dpr;
  canvas.height = H*dpr;
  canvas.style.width = W+"px";
  canvas.style.height = H+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
addEventListener('resize', resize);

// ── Tilt controls ─────────────────────
let tiltX = 0;
let tiltY = 0;
let baseBeta = null;
let baseGamma = null;

function handleOrientation(e){
  if(baseBeta === null){
    baseBeta = e.beta || 0;
    baseGamma = e.gamma || 0;
  }
  const db = (e.beta || 0) - baseBeta;
  const dg = (e.gamma || 0) - baseGamma;

  tiltY = Math.max(-1, Math.min(1, db / 30));
  tiltX = Math.max(-1, Math.min(1, dg / 30));
}

function requestOrientation(){
  if(typeof DeviceOrientationEvent !== 'undefined' &&
     typeof DeviceOrientationEvent.requestPermission === 'function'){
    DeviceOrientationEvent.requestPermission().then(s=>{
      if(s === 'granted'){
        window.addEventListener('deviceorientation', handleOrientation, true);
      }
    });
  } else {
    window.addEventListener('deviceorientation', handleOrientation, true);
  }
}

// trigger permission
window.addEventListener('touchstart', requestOrientation, {once:true});

// ── Python engine ─────────────────────
const ENGINE = `
import random
from dataclasses import dataclass

WORLD=None

WORDS=[
("recieve",True),("definately",True),("seperate",True),
("necessary",False),("beautiful",False),("parallel",False)
]

@dataclass
class E:
  id:int; x:float; y:float; z:float; r:float; word:str; bad:bool; alive:bool=True

def reset():
  global WORLD
  WORLD={"ents":{}, "next":1, "score":0}
  spawn(25)

def spawn(n):
  for _ in range(n):
    w=random.choice(WORDS)
    WORLD["ents"][WORLD["next"]] = E(
      WORLD["next"],
      random.uniform(-10,10),
      random.uniform(-6,6),
      -(10+random.random()*50),
      random.uniform(1.0,2.0),
      w[0],
      w[1]
    )
    WORLD["next"]+=1

def step(inp):
  for e in WORLD["ents"].values():
    if not e.alive: continue

    e.z += 0.04

    if e.z > 2:
      e.z = -(10+random.random()*50)
      e.x = random.uniform(-10,10)
      e.y = random.uniform(-6,6)

  return {
    "score":WORLD["score"],
    "ents":[e.__dict__ for e in WORLD["ents"].values() if e.alive]
  }

def pop(eid):
  e = WORLD["ents"].get(eid)
  if not e or not e.alive or not e.bad: return
  e.alive=False
  WORLD["score"]+=1

reset()
`;

let py;
let pyReady=false;

// helper
async function pyCall(expr, globals={}){
  for(const k in globals) py.globals.set(k, globals[k]);
  const r = await py.runPythonAsync(expr);
  for(const k in globals) py.globals.delete(k);
  return r.toJs({dict_converter:Object.fromEntries});
}

// ── Projection ─────────────────────────
function project(dx,dy,dz){
  if(dz>-0.2) return null;
  const f = Math.min(W,H)*1.1;
  const s = f/(-dz+0.001);
  return {x:W/2+dx*s, y:H/2+dy*s, s};
}

// ── Loop ───────────────────────────────
let last=0;

async function loop(ts){
  if(!pyReady){requestAnimationFrame(loop);return;}
  if(!last) last=ts;
  last=ts;

  const state = await pyCall("step({})");

  ctx.fillStyle="#000";
  ctx.fillRect(0,0,W,H);

  for(const e of state.ents){
    const p = project(e.x - tiltX*0.5, e.y - tiltY*0.5, e.z);
    if(!p) continue;

    const r = e.r * p.s;

    ctx.strokeStyle="rgba(125,255,141,0.8)";
    ctx.beginPath();
    ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.stroke();

    if(r>10){
      ctx.fillStyle="#caffcf";
      ctx.textAlign="center";
      ctx.textBaseline="middle";
      ctx.font=`${Math.min(22,r*0.4)}px monospace`;
      ctx.fillText(e.word, p.x, p.y);
    }

    // PERFECT COLLISION (center screen)
    if(e.bad){
      const dx = p.x - W/2;
      const dy = p.y - H/2;

      if(dx*dx + dy*dy < (r*1.6)*(r*1.6)){
        pyCall("pop(EID)", {EID:e.id});
      }
    }
  }

  document.getElementById("score").textContent = state.score;

  requestAnimationFrame(loop);
}

// ── Boot ──────────────────────────────
(async ()=>{
  py = await loadPyodide();
  await py.runPythonAsync(ENGINE);
  pyReady=true;
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
