<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Starpop · Word Shooter</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
<style>
html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:Consolas,monospace}
canvas{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}

#hud{
  position:fixed;top:10px;left:10px;
  font-size:13px;color:#7dff8d;
  background:rgba(0,10,0,.6);
  padding:6px 10px;
  border:1px solid rgba(125,255,141,.22);
  border-radius:6px;
  text-shadow:0 0 6px rgba(125,255,141,.4);
  opacity:0;transition:opacity .5s;
  pointer-events:none;
}
#hud strong{color:#caffcf}

#status{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  font-size:13px;color:#5aba6a;
  opacity:0;transition:opacity .4s;pointer-events:none;
}
#status.on{opacity:1}

#loader{
  position:fixed;inset:0;background:#000;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  color:#7dff8d;font-size:13px;text-shadow:0 0 8px rgba(125,255,141,.4);
}
.spin{
  width:36px;height:36px;border-radius:50%;
  border:2px solid #1a4a2a;border-top-color:#7dff8d;
  animation:sp 1s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg)}}
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;
  background:repeating-linear-gradient(to bottom,
    rgba(100,255,140,.012) 0,rgba(100,255,140,.012) 1px,
    transparent 2px,transparent 4px);
  mix-blend-mode:screen;opacity:.2;z-index:30;
}
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="hud">score <strong id="score">0</strong></div>
<div id="status"></div>
<div id="loader">
  <div class="spin"></div>
  <div>Loading Starpop…</div>
  <div style="font-size:11px;color:#2a6a3a">~15s on first load</div>
</div>

<script>
// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;
function resize(){
  const dpr = Math.max(1, devicePixelRatio || 1);
  W = innerWidth; H = innerHeight;
  canvas.width  = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
addEventListener('resize', resize);

// ── Input ─────────────────────────────────────────────────────────────────────
const input = { strafe: 0, forward: 0 };

canvas.addEventListener('touchstart', e => {
  revealHud();
  const t = e.touches[0];
  input.strafe  =  (t.clientX - W/2) / (W/2);
  input.forward = -(t.clientY - H/2) / (H/2);
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  const t = e.touches[0];
  input.strafe  =  (t.clientX - W/2) / (W/2);
  input.forward = -(t.clientY - H/2) / (H/2);
}, { passive: true });

canvas.addEventListener('touchend', () => { input.strafe = 0; input.forward = 0; });

// ── HUD ───────────────────────────────────────────────────────────────────────
let hudTimer = null;
function revealHud(ms = 2500){
  document.getElementById('hud').style.opacity = '1';
  clearTimeout(hudTimer);
  hudTimer = setTimeout(() => document.getElementById('hud').style.opacity = '0', ms);
}

let statusTimer = null;
function showStatus(msg){
  const el = document.getElementById('status');
  el.textContent = msg; el.classList.add('on');
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => el.classList.remove('on'), 1800);
  revealHud(2000);
}

// ── Engine ────────────────────────────────────────────────────────────────────
const ENGINE = `
import random, math
from dataclasses import dataclass, field

WORLD = None

# (misspelled_word, correct_word, error_count)
MISSPELLED = [
    ("recieve","receive",2),("occured","occurred",2),("untill","until",3),
    ("wierd","weird",3),("accomodate","accommodate",3),("existance","existence",2),
    ("grammer","grammar",2),("occassion","occasion",2),("neccessary","necessary",3),
    ("seperate","separate",2),("definately","definitely",3),("persue","pursue",2),
    ("embarass","embarrass",2),("reccomend","recommend",3),("belive","believe",2),
    ("begining","beginning",3),("arguement","argument",3),("truely","truly",2),
    ("comming","coming",2),("intresting","interesting",3),("maintainance","maintenance",3),
    ("parralel","parallel",3),("privelege","privilege",3),("recieved","received",2),
    ("relevent","relevant",2),("resistence","resistance",3),("resteraunt","restaurant",4),
    ("riddiculous","ridiculous",3),("succesfull","successful",3),("tounge","tongue",2),
    ("vaccum","vacuum",2),("writting","writing",2),("freind","friend",2),
    ("beleive","believe",3),("calender","calendar",2),("catagory","category",2),
    ("collegue","colleague",2),("concious","conscious",2),("dependant","dependent",2),
    ("dilemna","dilemma",2),("enviroment","environment",2),("febuary","february",2),
    ("goverment","government",2),("harrass","harass",2),("immediatly","immediately",3),
    ("innoculate","inoculate",2),("liason","liaison",2),("miniscule","minuscule",2),
    ("perseverence","perseverance",2),("pronounciation","pronunciation",3),
    ("shedule","schedule",2),("supercede","supersede",2),("tatoo","tattoo",2),
    ("tendancy","tendency",2),("tyrany","tyranny",2),("unforseen","unforeseen",2),
    ("vegeterian","vegetarian",2),("wether","whether",2),("aquire","acquire",2),
    ("publically","publicly",2),("technicly","technically",3),("payed","paid",2),
]

CORRECT = [
    "necessary","accommodate","occurrence","particularly","definitely",
    "separate","beautiful","beginning","conscience","millennium",
    "privilege","threshold","apparent","tendency","discipline",
    "embarrass","equipment","exaggerate","immediately","independent",
    "leisure","lieutenant","maintenance","noticeable","parallel",
    "persistent","relevant","resistance","restaurant","ridiculous",
    "silhouette","successful","technically","temperature","throughout",
    "guarantee","manoeuvre","fahrenheit","theoretical","unfortunately",
    "rhythm","liaison","questionnaire","bureaucracy","conscientious",
    "Mediterranean","miscellaneous","commemorate","chrysanthemum",
]

@dataclass
class Ent:
    id: int
    x: float; y: float; z: float
    r: float
    word: str
    bad: bool          # True = misspelled, should pop
    pts: int = 0       # points on pop
    alive: bool = True

def reset():
    global WORLD
    WORLD = {"ents": {}, "next": 1, "score": 0, "time": 0.0, "status": ""}
    _spawn(20)

def _spawn(n):
    for _ in range(n):
        if random.random() < 0.58:
            w, correct, errors = random.choice(MISSPELLED)
            bad = True; pts = 10 * errors
        else:
            w = random.choice(CORRECT)
            bad = False; pts = 0
        eid = WORLD["next"]
        WORLD["ents"][eid] = Ent(
            id=eid,
            x=random.uniform(-12, 12),
            y=random.uniform(-7, 7),
            z=-(12 + random.random() * 70),
            r=random.uniform(0.9, 2.2),
            word=w, bad=bad, pts=pts
        )
        WORLD["next"] += 1

def step(inp):
    if inp is None: inp = {}
    dt = float(inp.get("dt", 1/60))
    sx = float(inp.get("strafe",  0))
    sy = float(inp.get("forward", 0))

    # player drift (shift world opposite direction)
    px_delta =  sx * 5.5 * dt
    py_delta = -sy * 4.0 * dt

    WORLD["time"] += dt

    alive = [e for e in WORLD["ents"].values() if e.alive]
    if len(alive) < 10:
        _spawn(8)

    for e in alive:
        # move toward camera
        e.z += max(2.5, 3.5) * dt
        # apply player drift as world offset
        e.x -= px_delta
        e.y -= py_delta
        # very slight lateral damping
        e.x *= 0.998
        e.y *= 0.998
        # recycle
        if e.z > 2.5:
            e.z = -(15 + random.random() * 60)
            e.x = random.uniform(-12, 12)
            e.y = random.uniform(-7,  7)

    return {
        "score":  WORLD["score"],
        "status": WORLD["status"],
        "time":   WORLD["time"],
        "ents":   [{"id":e.id,"x":e.x,"y":e.y,"z":e.z,
                    "r":e.r,"word":e.word,"bad":e.bad,"pts":e.pts}
                   for e in alive],
    }

def pop(eid, pts):
    e = WORLD["ents"].get(int(eid))
    if not e or not e.alive or not e.bad: return 0
    e.alive = False
    WORLD["score"] += int(pts)
    WORLD["status"] = f'+{pts}'
    return int(pts)

reset()
`;

let py = null;

// ── Projection ────────────────────────────────────────────────────────────────
function project(x, y, z){
  if(z > -0.2) return null;
  const f = Math.min(W, H) * 1.1;
  const s = f / (-z + 0.001);
  return { x: W/2 + x*s, y: H/2 + y*s, s };
}

// ── Stars ──────────────────────────────────────────────────────────────────────
let time = 0;
function drawStars(){
  for(let i = 0; i < 460; i++){
    const seed = i * 17.123 + 9.331;
    const sx = ((((Math.sin(seed*.91)*43758.5)%1)+1)%1)-.5;
    const sy = ((((Math.sin(seed*1.37)*12345.6)%1)+1)%1)-.5;
    const sz = ((((Math.sin(seed*2.17)*98765.4)%1)+1)%1);
    const lay = .3 + (i%7)/7;
    const z = -(((sz*130 + time*(18+lay*55))%130)+2);
    const p = project(sx*170, sy*100, z);
    if(!p) continue;
    const size  = Math.max(.5, Math.min(2.2, p.s*.013*lay));
    const alpha = Math.max(.07, Math.min(.85, 1/((-z)*.052)));
    ctx.fillStyle = `rgba(125,255,141,${alpha})`;
    ctx.fillRect(p.x, p.y, size, size);
  }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
let lastTs = 0, lastStatus = '';

async function loop(ts){
  if(!lastTs) lastTs = ts;
  const dt = Math.min(0.05, (ts - lastTs) / 1000);
  lastTs = ts; time += dt;

  const state = (await py.runPythonAsync('step(INP)', { INP: { ...input, dt } }))
    .toJs({ dict_converter: Object.fromEntries });

  // ── Draw ──
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  for(const e of state.ents){
    const p = project(e.x, e.y, e.z);
    if(!p) continue;

    const r = e.r * p.s;

    // bubble
    const alpha = Math.max(.3, Math.min(.92, 1.5/((-e.z)*.072)));
    ctx.shadowColor = `rgba(125,255,141,${Math.min(.5, alpha*.6)})`;
    ctx.shadowBlur  = r * .28;
    ctx.strokeStyle = `rgba(125,255,141,${alpha})`;
    ctx.lineWidth   = Math.max(1, r*.04);
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // inner ring pulse
    if(r > 14){
      ctx.strokeStyle = `rgba(125,255,141,${alpha*.17})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r*(.70+Math.sin(time*3.1+e.id*1.7)*.05), 0, Math.PI*2);
      ctx.stroke();
    }

    // label
    if(r > 9){
      const fs = Math.max(9, Math.min(19, r*.33));
      ctx.font = `${fs}px Consolas,monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = `rgba(202,255,207,${alpha})`;
      ctx.fillText(e.word, p.x, p.y);
    }

    // ── Screen-space collision ─────────────────────────────────────────────
    if(e.bad){
      const cx = p.x - W/2;
      const cy = p.y - H/2;
      if(cx*cx + cy*cy < (r*1.2)*(r*1.2)){
        py.runPythonAsync('pop(EID, PTS)', { EID: e.id, PTS: e.pts });
        showStatus('+' + e.pts);
      }
    }
  }

  // HUD
  document.getElementById('score').textContent = state.score;

  requestAnimationFrame(loop);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  py = await loadPyodide();
  await py.runPythonAsync(ENGINE);
  document.getElementById('loader').style.display = 'none';
  revealHud(4000);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
