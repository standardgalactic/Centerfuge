<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Starpop · Word Shooter</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:Consolas,monospace}
canvas{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}

/* HUD — tap screen to toggle */
#hud{
  position:fixed;top:12px;left:12px;
  font-size:14px;color:#7dff8d;
  background:rgba(0,8,0,.65);
  border:1px solid rgba(125,255,141,.25);
  border-radius:8px;padding:7px 12px;
  line-height:1.7;
  opacity:0;transition:opacity .4s;
  pointer-events:none;
  text-shadow:0 0 8px rgba(125,255,141,.5);
}
#hud.on{opacity:1}
#hud strong{color:#caffcf}

/* Status line */
#status{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  font-size:12px;color:#3a8a4a;
  text-align:center;white-space:nowrap;
  opacity:0;transition:opacity .4s;
}
#status.on{opacity:1}

/* Legend */
#legend{
  position:fixed;top:12px;right:12px;
  font-size:11px;line-height:1.9;
  opacity:0;transition:opacity .4s;
  text-align:right;
}
#legend.on{opacity:1}
.lrow{display:flex;align-items:center;justify-content:flex-end;gap:6px}
.ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* Loading screen */
#loader{
  position:fixed;inset:0;background:#000;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  color:#7dff8d;font-size:13px;text-shadow:0 0 8px rgba(125,255,141,.4);
}
.spin{
  width:36px;height:36px;border-radius:50%;
  border:2px solid #1a4a2a;border-top-color:#7dff8d;
  animation:sp 1s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg)}}

/* scanlines */
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(100,255,140,.014) 0px,rgba(100,255,140,.014) 1px,
    transparent 2px,transparent 4px
  );
  mix-blend-mode:screen;opacity:.22;z-index:30;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
  score <strong id="score">0</strong><br>
  lives <strong id="lives">3</strong>
</div>

<div id="legend">
  <div class="lrow"><span style="color:#9fff9f">misspelled</span><div class="ldot" style="background:#7dff8d;box-shadow:0 0 5px #7dff8d"></div></div>
  <div class="lrow"><span style="color:#ffd080">correct</span><div class="ldot" style="background:#ffbb44;box-shadow:0 0 4px #ffbb44"></div></div>
</div>

<div id="status"></div>

<div id="loader">
  <div class="spin"></div>
  <div>Loading engine…</div>
  <div style="font-size:11px;color:#2a6a3a">~15 seconds on first load</div>
</div>

<script>
// ── Canvas ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;
function resize(){
  const dpr = Math.max(1, devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width  = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ── Input: just gentle drift from touch position ─────────────────────────────
const input = { strafe: 0, forward: 0 };

canvas.addEventListener('touchstart', e => {
  hudToggle(); // tap shows HUD
  applyDrift(e.touches[0]);
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  applyDrift(e.touches[0]);
}, { passive: false });

canvas.addEventListener('touchend', () => {
  input.strafe = 0;
  input.forward = 0;
});

function applyDrift(t) {
  // offset from center → normalized -1..1
  input.strafe  =  (t.clientX - W * 0.5) / (W * 0.5);
  input.forward = -(t.clientY - H * 0.5) / (H * 0.5); // up = positive
}

// ── HUD toggle ───────────────────────────────────────────────────────────────
let hudOn = false, hudTimer = null;
function hudToggle(){
  hudOn = true;
  ['hud','legend','status'].forEach(id => document.getElementById(id).classList.add('on'));
  clearTimeout(hudTimer);
  hudTimer = setTimeout(() => {
    hudOn = false;
    ['hud','legend','status'].forEach(id => document.getElementById(id).classList.remove('on'));
  }, 3000);
}

function setStatus(msg){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('on'), 2500);
}

// ── Python engine ────────────────────────────────────────────────────────────
const ENGINE = String.raw`
import math, random
from dataclasses import dataclass, field

WORLD = None

CORRECT = [
    "necessary","accommodate","occurrence","particularly","definitely",
    "separate","beautiful","beginning","conscience","millennium",
    "privilege","threshold","apparent","tendency","discipline",
    "embarrass","equipment","exaggerate","immediately","independent",
    "leisure","lieutenant","maintenance","noticeable","parallel",
    "persistent","relevant","resistance","restaurant","ridiculous",
    "silhouette","successful","technically","temperature","throughout",
    "guarantee","manoeuvre","fahrenheit","theoretical","unfortunately",
]

MISSPELLED = [
    ("recieve","receive",2),("occured","occurred",2),("untill","until",3),
    ("wierd","weird",3),("accomodate","accommodate",3),("existance","existence",2),
    ("grammer","grammar",2),("occassion","occasion",2),("neccessary","necessary",3),
    ("seperate","separate",2),("definately","definitely",3),("persue","pursue",2),
    ("embarass","embarrass",2),("reccomend","recommend",3),("belive","believe",2),
    ("begining","beginning",3),("arguement","argument",3),("truely","truly",2),
    ("comming","coming",2),("intresting","interesting",3),("maintainance","maintenance",3),
    ("parralel","parallel",3),("privelege","privilege",3),("recieved","received",2),
    ("relevent","relevant",2),("resistence","resistance",3),("resteraunt","restaurant",4),
    ("riddiculous","ridiculous",3),("succesfull","successful",3),("tounge","tongue",2),
    ("vaccum","vacuum",2),("writting","writing",2),("writeing","writing",2),
    ("lieing","lying",2),("payed","paid",2),("refered","referred",2),
    ("aquire","acquire",2),("publically","publicly",2),("technicly","technically",3),
]

def clamp(x, lo, hi): return lo if x < lo else hi if x > hi else x

@dataclass
class Entity:
    eid: int
    kind: str
    x: float; y: float; z: float
    vx: float = 0.; vy: float = 0.; vz: float = 0.
    radius: float = 0.5
    life: float = 9999.
    alive: bool = True
    tags: set = field(default_factory=set)
    data: dict = field(default_factory=dict)

class World:
    def __init__(self):
        self.next_id = 1
        self.entities = {}
        self.score = 0
        self.lives = 3
        self.time  = 0.
        self.status = "fly through space"
        self.player = {"x": 0., "y": 0.}

    def spawn(self, kind, x, y, z, vx=0., vy=0., vz=0.,
              radius=0.5, tags=None, life=9999., data=None):
        e = Entity(eid=self.next_id, kind=kind,
                   x=float(x), y=float(y), z=float(z),
                   vx=float(vx), vy=float(vy), vz=float(vz),
                   radius=float(radius),
                   tags=set(tags or []),
                   life=float(life),
                   data=dict(data or {}))
        self.entities[e.eid] = e
        self.next_id += 1
        return e

def reset_world():
    global WORLD
    WORLD = World()
    spawn_wave(14)
    return {"ok": True, "status": "reset"}

def spawn_wave(count=8):
    w = WORLD
    count = int(count)
    for _ in range(count):
        z      = -(25 + random.random() * 80)
        x      = random.uniform(-14, 14)
        y      = random.uniform(-8, 8)
        radius = random.uniform(0.9, 2.1)
        vz     = random.uniform(2.5, 4.5)     # always moving forward
        vx     = random.uniform(-0.15, 0.15)  # barely any lateral drift
        vy     = random.uniform(-0.10, 0.10)
        if random.random() < 0.62:
            word, correct, errors = random.choice(MISSPELLED)
            w.spawn("word", x, y, z, vx=vx, vy=vy, vz=vz, radius=radius,
                    tags={"misspelled"}, data={"label": word, "errors": errors, "correct": correct})
        else:
            word = random.choice(CORRECT)
            w.spawn("word", x, y, z, vx=vx, vy=vy, vz=vz, radius=radius,
                    tags={"correct"}, data={"label": word, "errors": 0})
    return {"ok": True}

def update_player(inp, dt):
    w = WORLD; p = w.player
    p["x"] += float(inp.get("strafe",  0.)) * 5.5 * dt
    p["y"] -= float(inp.get("forward", 0.)) * 4.0 * dt
    # soft boundary
    p["x"] = clamp(p["x"], -12., 12.)
    p["y"] = clamp(p["y"],  -7.,  7.)

def burst(entity, count=8, col="green"):
    w = WORLD
    for i in range(count):
        angle = (i / max(1, count)) * 6.2832
        spd   = random.uniform(1.0, 2.5)
        w.spawn("particle", entity.x, entity.y, entity.z,
                vx=math.cos(angle)*spd, vy=math.sin(angle)*spd,
                vz=random.uniform(0., 1.),
                radius=0.06, life=0.65, data={"col": col})

def pop_entity(e):
    if not e.alive: return
    e.alive = False
    if "misspelled" in e.tags:
        pts = 10 * e.data.get("errors", 1)
        WORLD.score += pts
        WORLD.status = f'+{pts}  "{e.data["label"]}" → "{e.data["correct"]}"'
        burst(e, 10, "green")
    elif "correct" in e.tags:
        WORLD.score = max(0, WORLD.score - 15)
        WORLD.lives = max(0, WORLD.lives - 1)
        WORLD.status = f'−15  "{e.data["label"]}" was spelled correctly'
        burst(e, 6, "amber")

def update_entities(dt):
    w = WORLD; p = w.player
    alive = [e for e in w.entities.values() if e.alive and e.kind == "word"]
    if len(alive) < 7:
        spawn_wave(8)
    for e in list(w.entities.values()):
        if not e.alive: continue
        # damp lateral, keep forward speed high
        e.vx *= 0.94
        e.vy *= 0.94
        e.vz  = max(2.5, e.vz)
        e.x  += e.vx * dt
        e.y  += e.vy * dt
        e.z  += e.vz * dt
        e.life -= dt
        if e.kind == "particle":
            e.vx *= 0.97; e.vy *= 0.97; e.vz *= 0.98
        if e.life <= 0:
            e.alive = False; continue
        dz = e.z - 0.  # player is always at z=0
        if e.kind == "word" and dz > 2.5:
            # recycle behind
            e.z  = -(30 + random.random() * 60)
            e.x  = p["x"] + random.uniform(-14, 14)
            e.y  = p["y"] + random.uniform(-8, 8)
            e.vx = random.uniform(-0.15, 0.15)
            e.vy = random.uniform(-0.10, 0.10)
        # collision: word touches player
        if e.kind == "word":
            dx = e.x - p["x"]; dy = e.y - p["y"]; dz2 = e.z
            if (dx*dx + dy*dy + dz2*dz2) < (e.radius + 0.55)**2:
                pop_entity(e)

def serializable_state():
    w = WORLD; payload = []
    for e in w.entities.values():
        if not e.alive: continue
        payload.append({"id": e.eid, "kind": e.kind,
                         "x": e.x, "y": e.y, "z": e.z,
                         "radius": e.radius,
                         "tags": list(e.tags),
                         "life": e.life,
                         "data": dict(e.data)})
    return {"score": w.score, "lives": w.lives,
            "entities": payload, "status": w.status,
            "player": dict(w.player), "time": w.time}

def step_game(inp):
    if hasattr(inp, "to_py"): inp = inp.to_py()
    if inp is None: inp = {}
    w = WORLD
    if w.lives <= 0:
        w.time += 1./60.; return serializable_state()
    dt = float(inp.get("dt", 1./60.))
    update_player(inp, dt)
    update_entities(dt)
    w.time += dt
    return serializable_state()

reset_world()
`;

let pyodide = null, pyReady = false;

async function boot(){
  pyodide = await loadPyodide();
  await pyodide.runPythonAsync(ENGINE);
  pyReady = true;
  document.getElementById('loader').style.display = 'none';
  hudToggle();
  requestAnimationFrame(frame);
}

async function pyCall(expr, globals = {}){
  for(const [k, v] of Object.entries(globals)) pyodide.globals.set(k, v);
  try {
    const r = await pyodide.runPythonAsync(expr);
    return r && typeof r.toJs === 'function'
      ? r.toJs({ dict_converter: Object.fromEntries }) : r;
  } finally {
    for(const k of Object.keys(globals)) pyodide.globals.delete(k);
  }
}

// ── Projection (no rotation — pure perspective) ───────────────────────────────
function project(dx, dy, dz){
  if(dz > -0.3) return null;
  const focal = Math.min(W, H) * 1.1;
  const sc    = focal / (-dz + 0.0001);
  return { x: W * 0.5 + dx * sc, y: H * 0.5 + dy * sc, scale: sc, depth: -dz };
}

// ── Stars ──────────────────────────────────────────────────────────────────────
function drawStars(player, time){
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  for(let i = 0; i < 420; i++){
    const s  = i * 17.123 + 9.331;
    const sx = ((((Math.sin(s * .91) * 43758.5) % 1) + 1) % 1) - 0.5;
    const sy = ((((Math.sin(s * 1.37) * 12345.6) % 1) + 1) % 1) - 0.5;
    const sz = ((((Math.sin(s * 2.17) * 98765.4) % 1) + 1) % 1);
    const lay = 0.3 + (i % 7) / 7;
    const x  = sx * 170;
    const y  = sy * 100;
    const z  = -(((sz * 130 + time * (20 + lay * 60)) % 130) + 2);
    const p  = project(x - player.x * 0.04, y - player.y * 0.04, z);
    if(!p) continue;
    const size  = Math.max(0.6, Math.min(2.4, p.scale * 0.014 * lay));
    const alpha = Math.max(0.1, Math.min(0.9, 1 / (p.depth * 0.055)));
    ctx.fillStyle = `rgba(125,255,141,${alpha})`;
    ctx.fillRect(p.x, p.y, size, size);
  }
}

// ── Entities ──────────────────────────────────────────────────────────────────
function drawEntities(state){
  const pl = state.player;
  const ds = [];
  for(const e of state.entities){
    const p = project(e.x - pl.x, e.y - pl.y, e.z);
    if(!p) continue;
    const r = Math.max(e.kind === 'particle' ? 1.5 : 8, e.radius * p.scale);
    ds.push({ e, p, r });
  }
  ds.sort((a, b) => b.p.depth - a.p.depth);

  for(const { e, p, r } of ds){
    if(e.kind === 'particle'){
      const col = e.data && e.data.col === 'amber' ? '255,187,68' : '125,255,141';
      const alpha = Math.min(0.9, e.life * 1.4);
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(1.2, r * 0.5), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${col},${alpha})`;
      ctx.fill();
      continue;
    }

    const isMiss = e.tags && e.tags.includes('misspelled');
    const isCorr = e.tags && e.tags.includes('correct');
    const alpha  = Math.max(0.35, Math.min(0.95, 1.5 / (p.depth * 0.075)));

    // glow halo
    if(isMiss){
      ctx.shadowColor = 'rgba(125,255,141,0.35)';
      ctx.shadowBlur  = r * 0.35;
      ctx.strokeStyle = `rgba(125,255,141,${alpha})`;
    } else {
      ctx.shadowColor = 'rgba(255,187,68,0.25)';
      ctx.shadowBlur  = r * 0.22;
      ctx.strokeStyle = `rgba(255,187,68,${alpha})`;
    }

    ctx.lineWidth = Math.max(1, r * 0.045);
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // inner ring pulse (misspelled only)
    if(isMiss && r > 12){
      const pulse = 0.72 + Math.sin(state.time * 3.5 + e.id * 1.3) * 0.06;
      ctx.strokeStyle = `rgba(125,255,141,${alpha * 0.22})`;
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r * pulse, 0, Math.PI * 2);
      ctx.stroke();
    }

    // label
    if(r > 10){
      const label = e.data && e.data.label ? e.data.label : '';
      const fs    = Math.max(9, Math.min(20, r * 0.34));
      ctx.font          = `${fs}px Consolas,monospace`;
      ctx.textAlign     = 'center';
      ctx.textBaseline  = 'middle';
      ctx.fillStyle     = isMiss
        ? `rgba(202,255,207,${alpha})`
        : `rgba(255,220,140,${alpha})`;
      ctx.fillText(label, p.x, p.y);

      // error badge
      if(isMiss && e.data.errors && r > 18){
        ctx.font      = `bold ${Math.max(8, fs * 0.6)}px Consolas,monospace`;
        ctx.fillStyle = `rgba(255,90,90,0.85)`;
        ctx.fillText(`×${e.data.errors}`, p.x + r * 0.62, p.y - r * 0.58);
      }
    }
  }
}

// ── HUD update ────────────────────────────────────────────────────────────────
let lastStatus = '';
function updateHud(state){
  document.getElementById('score').textContent = state.score;
  document.getElementById('lives').textContent = state.lives;
  if(state.status && state.status !== lastStatus && state.status !== 'fly through space'){
    lastStatus = state.status;
    setStatus(state.status);
    hudToggle();
  }
}

// ── Loop ──────────────────────────────────────────────────────────────────────
let lastTs = 0;
async function frame(ts){
  if(!pyReady){ requestAnimationFrame(frame); return; }
  if(!lastTs) lastTs = ts;
  const dt = Math.min(0.05, (ts - lastTs) / 1000);
  lastTs = ts;

  try{
    const state = await pyCall('step_game(INP)', {
      INP: { strafe: input.strafe, forward: input.forward, dt }
    });
    if(state){
      drawStars(state.player, state.time);
      drawEntities(state);
      updateHud(state);
    }
  } catch(err){
    setStatus('err: ' + String(err).slice(0, 60));
  }

  requestAnimationFrame(frame);
}

boot();
</script>
</body>
</html>
