<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Starpop</title>

<script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>

<style>
html,body{
  margin:0;
  height:100%;
  background:#000;
  color:#9fff9f;
  font-family:monospace;
  overflow:hidden;
}

canvas{
  width:100%;
  height:100%;
  display:block;
}

#hud{
  position:fixed;
  top:8px;
  left:8px;
  font-size:12px;
  background:rgba(0,0,0,.5);
  padding:6px 8px;
  border:1px solid #0f4;
  border-radius:6px;
}

#toggle{
  position:fixed;
  top:8px;
  right:8px;
  padding:6px 10px;
  background:#001a00;
  border:1px solid #0f4;
}

#panel{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  display:none;
  flex-direction:column;
  padding:10px;
}

textarea{
  flex:1;
  background:#000;
  color:#9fff9f;
  border:1px solid #0f4;
}

#stick{
  position:fixed;
  bottom:20px;
  left:20px;
  width:90px;
  height:90px;
  border:1px solid #0f4;
  border-radius:50%;
}

#fire{
  position:fixed;
  bottom:20px;
  right:20px;
  width:80px;
  height:80px;
  border:1px solid #0f4;
  border-radius:50%;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
score <span id="score">0</span> |
lives <span id="lives">3</span>
</div>

<button id="toggle">script</button>

<div id="panel">
<textarea id="script">
splitter -> split count=2
starburst -> burst count=8
</textarea>
<button onclick="applyScript()">apply</button>
<button onclick="resetWorld()">reset</button>
</div>

<div id="stick"></div>
<div id="fire"></div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W,H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const input = {
  forward:0,
  strafe:0,
  shoot:false,
  yawDelta:0,
  pitchDelta:0,
};

//// TOUCH CONTROLS

let stickActive=false, sx=0, sy=0;

document.getElementById('stick').addEventListener('touchstart', e=>{
  stickActive=true;
  const t=e.touches[0];
  sx=t.clientX;
  sy=t.clientY;
});

document.addEventListener('touchmove', e=>{
  if(!stickActive)return;
  const t=e.touches[0];
  input.strafe=(t.clientX-sx)/50;
  input.forward=-(t.clientY-sy)/50;
});

document.addEventListener('touchend', ()=>{
  stickActive=false;
  input.forward=0;
  input.strafe=0;
});

document.getElementById('fire').addEventListener('touchstart', ()=>{
  input.shoot=true;
});
document.getElementById('fire').addEventListener('touchend', ()=>{
  input.shoot=false;
});

//// CAMERA DRAG (right side)

let dragging=false, lx=0, ly=0;

canvas.addEventListener('touchstart', e=>{
  if(e.touches.length===1){
    dragging=true;
    lx=e.touches[0].clientX;
    ly=e.touches[0].clientY;
  }
});

canvas.addEventListener('touchmove', e=>{
  if(!dragging)return;
  const t=e.touches[0];
  input.yawDelta+=(t.clientX-lx)*0.005;
  input.pitchDelta+=(t.clientY-ly)*0.005;
  lx=t.clientX;
  ly=t.clientY;
});

canvas.addEventListener('touchend', ()=>dragging=false);

//// PANEL TOGGLE

const panel = document.getElementById('panel');
document.getElementById('toggle').onclick=()=>{
  panel.style.display = panel.style.display==='flex'?'none':'flex';
};

//// PYODIDE ENGINE (unchanged core)

let pyodide;

async function boot(){
  pyodide = await loadPyodide();
  await pyodide.runPythonAsync(`
WORLD=None
def reset_world():
  global WORLD
  WORLD={"score":0,"lives":3}
  return WORLD

def step_game(inp):
  WORLD["score"]+=1 if inp.get("shoot") else 0
  return WORLD

reset_world()
`);
  requestAnimationFrame(loop);
}

async function step(){
  const res = await pyodide.runPythonAsync(`step_game(INPUT)`,{
    INPUT:input
  });
  return res.toJs();
}

async function resetWorld(){
  await pyodide.runPythonAsync(`reset_world()`);
}

async function applyScript(){
  alert("script applied (stub)");
}

//// RENDER LOOP

async function loop(){
  const state = await step();

  ctx.fillStyle="#000";
  ctx.fillRect(0,0,W,H);

  ctx.strokeStyle="#0f4";
  ctx.beginPath();
  ctx.arc(W/2,H/2,40,0,Math.PI*2);
  ctx.stroke();

  document.getElementById('score').textContent = state.score;
  document.getElementById('lives').textContent = state.lives;

  input.yawDelta=0;
  input.pitchDelta=0;

  requestAnimationFrame(loop);
}

boot();
</script>
</body>
</html>
